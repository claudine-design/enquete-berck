<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cartes QR &mdash; Appart-H&ocirc;tel Berck</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --noir:#0a0a0a;
  --noir-profond:#050505;
  --or-clair:#f4d98a;
  --or:#d4a84a;
  --or-cuivre:#b8872c;
  --or-fonce:#7a5a1c;
  --creme:#f5ecd9;
}
body{
  font-family:'Inter',sans-serif;
  background:#1a1a1a;color:#333;padding:20px;min-height:100vh;
}

/* CONFIG PANEL */
.config{max-width:640px;margin:0 auto 24px;background:#fff;border-radius:16px;padding:28px;box-shadow:0 8px 32px rgba(0,0,0,0.3)}
.config h1{font-family:'Cinzel',serif;font-size:24px;margin-bottom:8px;color:#0a0a0a;font-weight:500;letter-spacing:2px}
.config p{font-size:14px;color:#64748b;margin-bottom:18px;line-height:1.5}
.config label{font-size:12px;font-weight:600;color:#475569;display:block;margin-bottom:6px;text-transform:uppercase;letter-spacing:0.5px}
.config input{width:100%;padding:12px 14px;border:2px solid #e2e8f0;border-radius:10px;font-size:14px;margin-bottom:14px;font-family:inherit}
.config input:focus{outline:none;border-color:var(--or)}
.config button{padding:13px 28px;background:var(--noir);color:var(--or);border:1px solid var(--or);border-radius:10px;font-size:13px;font-weight:500;cursor:pointer;font-family:'Cinzel',serif;letter-spacing:2px;text-transform:uppercase;transition:all .2s}
.config button:hover{background:var(--or);color:var(--noir)}

.actions{max-width:640px;margin:0 auto 30px;display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
.actions button{padding:12px 24px;border:1px solid var(--or);border-radius:10px;background:transparent;color:var(--or);font-size:12px;font-weight:500;cursor:pointer;font-family:'Cinzel',serif;letter-spacing:2px;text-transform:uppercase;transition:all .2s}
.actions button:hover{background:var(--or);color:var(--noir)}
.actions .print-btn{background:var(--or);color:var(--noir);font-weight:600}
.actions .print-btn:hover{background:var(--or-clair)}

/* GRID */
.grid{max-width:900px;margin:0 auto;display:flex;flex-direction:column;align-items:center;gap:24px}

/* CARTE — Format photo (10x15 par défaut, 13x18 via body.fmt-13x18) */
.qr-card{
  width:100mm;height:150mm;
  background:radial-gradient(ellipse at center,#141414 0%,#0a0a0a 60%,#050505 100%);
  color:var(--creme);
  padding:7mm 6mm;
  display:flex;flex-direction:column;align-items:center;justify-content:space-between;
  position:relative;
  box-shadow:0 12px 40px rgba(0,0,0,0.5);
  overflow:hidden;
  break-inside:avoid;page-break-inside:avoid;
}

/* Bordure dorée double */
.qr-card::before{
  content:"";position:absolute;top:3mm;left:3mm;right:3mm;bottom:3mm;
  border:1px solid var(--or-cuivre);pointer-events:none;z-index:3;
}
.qr-card::after{
  content:"";position:absolute;top:4mm;left:4mm;right:4mm;bottom:4mm;
  border:0.3px solid rgba(212,168,74,0.3);pointer-events:none;z-index:3;
}

/* FLEUR DE LYS EN FILIGRANE (fond, pleine carte) */
.lys-bg{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:110mm;height:auto;z-index:1;
  opacity:0.08;pointer-events:none;
}
.lys-bg path{fill:#f4d98a}

/* HAUT */
.head{text-align:center;padding-top:3mm;position:relative;z-index:2;width:100%}
.lys-top{width:12mm;height:15mm;display:block;margin:0 auto 2mm}

.brand-url{
  font-family:'Cinzel',serif;font-size:11px;font-weight:500;
  background:linear-gradient(180deg,var(--or-clair) 0%,var(--or) 50%,var(--or-cuivre) 100%);
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
  letter-spacing:3px;margin-top:1mm;
}

/* Séparateur floral */
.separator{display:flex;align-items:center;justify-content:center;gap:4mm;margin:2mm 0;position:relative;z-index:2;width:100%}
.separator .line{width:18mm;height:1px;background:linear-gradient(90deg,transparent,var(--or-cuivre) 50%,transparent)}
.separator svg{width:10mm;height:4mm;fill:var(--or)}

/* MILIEU */
.middle{text-align:center;position:relative;z-index:2;padding:1mm 0}
.middle .title-main{
  font-family:'Cinzel',serif;font-size:11px;font-weight:500;
  color:var(--or);letter-spacing:4px;text-transform:uppercase;
  line-height:1.4;margin-bottom:2mm;
}
.middle .appart-name{
  font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:500;font-style:italic;
  color:var(--creme);line-height:1;margin-bottom:1mm;
  text-shadow:0 1px 2px rgba(0,0,0,0.4);
}
.middle .residence{font-family:'Cinzel',serif;font-size:7px;color:var(--or-cuivre);letter-spacing:2px;text-transform:uppercase;margin-top:1mm}

/* QR frame — AGRANDI */
.qr-wrap{
  background:var(--creme);padding:3mm;
  margin:3mm 0;position:relative;z-index:2;
  box-shadow:0 4px 20px rgba(0,0,0,0.5), inset 0 0 0 0.5mm var(--or-cuivre);
}
.qr-wrap::before{
  content:"";position:absolute;inset:1mm;
  border:0.5px solid rgba(122,90,28,0.4);pointer-events:none;
}
.qr-wrap canvas{display:block;width:55mm;height:55mm}

/* BAS */
.footer-msg{text-align:center;position:relative;z-index:2;padding-bottom:1mm}
.footer-msg .quote{
  font-family:'Cormorant Garamond',serif;font-size:11px;font-style:italic;
  color:var(--creme);line-height:1.3;margin-bottom:2mm;font-weight:400;
}
.footer-msg .bonus{
  display:inline-block;padding:1.5mm 5mm;
  border-top:1px solid var(--or-cuivre);border-bottom:1px solid var(--or-cuivre);
  font-family:'Cinzel',serif;font-size:7px;letter-spacing:3px;text-transform:uppercase;
  color:var(--or);
}
.footer-msg .bonus strong{color:var(--or-clair);font-weight:600;font-size:9px}
.signature{margin-top:2mm;font-family:'Cormorant Garamond',serif;font-size:9px;font-style:italic;color:var(--or);letter-spacing:1px;opacity:0.85}

/* === Format 13x18 cm (1 par A4 — pour cadre photo) === */
body.fmt-13x18 .qr-card{width:130mm;height:180mm;padding:9mm 8mm}
body.fmt-13x18 .qr-card .lys-top{width:16mm;height:20mm}
body.fmt-13x18 .qr-card .brand-url{font-size:14px;letter-spacing:4px}
body.fmt-13x18 .qr-card .title-main{font-size:14px;letter-spacing:5px}
body.fmt-13x18 .qr-card .appart-name{font-size:28px}
body.fmt-13x18 .qr-card .qr-wrap canvas{width:70mm;height:70mm}
body.fmt-13x18 .qr-card .quote{font-size:14px}

/* === Format 10x15 cm (2 par A4 paysage, économique) === */
body.fmt-2parA4 .qr-card{width:100mm;height:150mm}

/* === Format 9x13 cm compact (4 par A4 portrait) === */
body.fmt-4parA4 .qr-card{width:90mm;height:130mm;padding:5mm 4mm}
body.fmt-4parA4 .qr-card .lys-top{width:10mm;height:13mm;margin-bottom:1mm}
body.fmt-4parA4 .qr-card .brand-url{font-size:9px;letter-spacing:2px}
body.fmt-4parA4 .qr-card .title-main{font-size:9px;letter-spacing:3px;margin-bottom:1mm}
body.fmt-4parA4 .qr-card .appart-name{font-size:18px}
body.fmt-4parA4 .qr-card .residence{font-size:6px}
body.fmt-4parA4 .qr-card .qr-wrap{padding:2mm;margin:2mm 0}
body.fmt-4parA4 .qr-card .qr-wrap canvas{width:48mm;height:48mm}
body.fmt-4parA4 .qr-card .quote{font-size:9px;margin-bottom:1mm}
body.fmt-4parA4 .qr-card .bonus{font-size:6px;letter-spacing:2px;padding:1mm 4mm}
body.fmt-4parA4 .qr-card .bonus strong{font-size:8px}
body.fmt-4parA4 .qr-card .signature{font-size:8px;margin-top:1mm}
body.fmt-4parA4 .qr-card .separator{margin:1mm 0}

/* Grille pour multi-cartes A4 */
body.fmt-2parA4 .grid{flex-direction:row;flex-wrap:wrap;gap:0;max-width:297mm}
body.fmt-4parA4 .grid{flex-direction:row;flex-wrap:wrap;gap:0;max-width:210mm;justify-content:center}

/* PRINT */
@media print{
  body{background:#fff;padding:0;margin:0}
  .config,.actions{display:none!important}
  .grid{gap:0;max-width:100%}
  .qr-card{
    box-shadow:none;margin:0;
    page-break-inside:avoid;
    print-color-adjust:exact;-webkit-print-color-adjust:exact;
  }
  /* 1 carte par page (10x15 par défaut, 13x18 si fmt-13x18) */
  body:not(.fmt-2parA4):not(.fmt-4parA4) .qr-card{page-break-after:always}
  body.fmt-13x18 .qr-card{width:130mm;height:180mm}
  /* Multi sur A4 : pas de page-break entre, sauf après chaque groupe */
  body.fmt-2parA4 .grid{flex-direction:row;flex-wrap:wrap;width:297mm;height:210mm}
  body.fmt-2parA4 .qr-card:nth-child(2n){page-break-after:always}
  body.fmt-4parA4 .grid{flex-direction:row;flex-wrap:wrap;width:210mm}
  body.fmt-4parA4 .qr-card:nth-child(4n){page-break-after:always}
}

@media(max-width:600px){
  .qr-card{width:100%;height:auto;min-height:500px;padding:20px 15px}
}
</style>
</head>
<body>

<div class="config" id="config">
  <h1>Cartes QR &mdash; Enqu&ecirc;te Voyageurs</h1>
  <p>Design noir &amp; or, inspir&eacute; de l'identit&eacute; Princesse d'Opale. Format A5 (1 par page) &mdash; pr&ecirc;t &agrave; d&eacute;couper et placer dans chaque logement.</p>
  <label for="format">Format d'impression</label>
  <select id="format" style="width:100%;padding:12px 14px;border:2px solid #e2e8f0;border-radius:10px;font-size:14px;margin-bottom:14px;background:#fff;font-family:inherit">
    <option value="2parA4" selected>10 &times; 15 cm &mdash; 2 par A4 (&eacute;conomique)</option>
    <option value="13x18">13 &times; 18 cm &mdash; 1 par A4 (id&eacute;al cadre photo)</option>
    <option value="10x15">10 &times; 15 cm &mdash; 1 par page format photo</option>
    <option value="4parA4">9 &times; 13 cm &mdash; 4 par A4 portrait (tr&egrave;s &eacute;conomique)</option>
  </select>
  <label for="baseUrl">URL de base du questionnaire</label>
  <input type="text" id="baseUrl" placeholder="https://appart-hotel-berck.com/avis" value="https://appart-hotel-berck.com/avis">
  <button onclick="generateAll()">G&eacute;n&eacute;rer les cartes</button>
</div>

<div class="actions" id="actions" style="display:none">
  <button onclick="downloadPDF()" class="print-btn">&#x1F4E5; T&eacute;l&eacute;charger PDF (2 par A4)</button>
  <button onclick="window.print()">&#x1F5A8;&#xFE0F; Imprimer</button>
  <button onclick="document.getElementById('config').style.display='block'">Modifier l'URL</button>
</div>

<div class="grid" id="grid"></div>

<script>
var APPARTEMENTS = {
  'Le 23 &mdash; Mar\u00e9chal Juin': ['Kitesurf', 'Hamac', 'Paddle', 'Surf', 'Famille'],
  'Le 25 &mdash; Mar\u00e9chal Juin': ['Baln\u00e9o', 'Cocon Romantique'],
  'R\u00e9sidence Apollo': ['La R\u00e9serve', 'Kingston', 'Apolove', 'Apollo'],
  'R\u00e9sidence Albatros': ['Albatros'],
  'R\u00e9sidence Face Mer': ['Face Mer'],
  'R\u00e9sidence Grand Large': ['Grand Large'],
  'Esplanade': ['Mini Love Room', 'Grande Love Room'],
  'Rue Jeanne': ['Jeanne', '\u00c9vasion', 'Rotonde', 'Patio'],
  'Terrasse': ['Terrasse', 'Maisonnette']
};

// Fleur de lys grande (filigrane fond)
var LYS_BG_SVG = '<svg class="lys-bg" viewBox="0 0 32 40" xmlns="http://www.w3.org/2000/svg">' +
  '<path d="M16 0c1.5 5 6 8 6 14-1-1-3.5-2-6-2s-5 1-6 2c0-6 4.5-9 6-14zM8 16c-2 3-2 7 0 10 1.5 2.5 4 4 8 6 4-2 6.5-3.5 8-6 2-3 2-7 0-10-2 2-5 3-8 3s-6-1-8-3zM10 34c2 2 4 3.5 6 6 2-2.5 4-4 6-6-2 .5-4 .8-6 .8s-4-.3-6-.8z"/>' +
  '</svg>';

// Fleur de lys petite dorée (en tête de carte)
var LYS_TOP_SVG = '<svg class="lys-top" viewBox="0 0 32 40" xmlns="http://www.w3.org/2000/svg">' +
  '<defs>' +
    '<linearGradient id="orGradTop" x1="0%" y1="0%" x2="0%" y2="100%">' +
      '<stop offset="0%" stop-color="#f4d98a"/>' +
      '<stop offset="50%" stop-color="#d4a84a"/>' +
      '<stop offset="100%" stop-color="#b8872c"/>' +
    '</linearGradient>' +
  '</defs>' +
  '<path fill="url(#orGradTop)" d="M16 0c1.5 5 6 8 6 14-1-1-3.5-2-6-2s-5 1-6 2c0-6 4.5-9 6-14zM8 16c-2 3-2 7 0 10 1.5 2.5 4 4 8 6 4-2 6.5-3.5 8-6 2-3 2-7 0-10-2 2-5 3-8 3s-6-1-8-3zM10 34c2 2 4 3.5 6 6 2-2.5 4-4 6-6-2 .5-4 .8-6 .8s-4-.3-6-.8z"/>' +
  '</svg>';

// (ancien ornement baroque désactivé)
var ORNEMENT_SVG_UNUSED = '<svg viewBox="0 0 400 140" xmlns="http://www.w3.org/2000/svg">' +
  '<defs>' +
    '<linearGradient id="orGrad" x1="0%" y1="0%" x2="0%" y2="100%">' +
      '<stop offset="0%" stop-color="#f4d98a"/>' +
      '<stop offset="50%" stop-color="#d4a84a"/>' +
      '<stop offset="100%" stop-color="#b8872c"/>' +
    '</linearGradient>' +
  '</defs>' +
  '<g fill="url(#orGrad)" stroke="url(#orGrad)" stroke-width="0.6" stroke-linecap="round" stroke-linejoin="round">' +
    // === FLEUR DE LYS CENTRALE (grande, stylisée) ===
    '<path d="M200 18 C201 24 206 28 206 36 C204 34 201 33 200 33 C199 33 196 34 194 36 C194 28 199 24 200 18 Z" stroke="none"/>' +
    '<path d="M189 38 C186 43 186 49 189 54 C193 60 200 63 200 63 C200 63 207 60 211 54 C214 49 214 43 211 38 C208 42 204 43 200 43 C196 43 192 42 189 38 Z" stroke="none"/>' +
    // Bandeau horizontal de la fleur de lys
    '<rect x="183" y="46" width="34" height="2.5" stroke="none"/>' +
    '<rect x="180" y="49" width="40" height="1" stroke="none"/>' +
    // Pétales latéraux de la fleur de lys
    '<path d="M189 42 C184 44 179 46 176 50 C178 51 182 50 186 48 C185 46 187 43 189 42 Z M211 42 C216 44 221 46 224 50 C222 51 218 50 214 48 C215 46 213 43 211 42 Z" stroke="none"/>' +
    // Base stylisée sous la fleur
    '<path d="M194 63 C195 66 197 68 200 71 C203 68 205 66 206 63 C204 64 202 65 200 65 C198 65 196 64 194 63 Z" stroke="none"/>' +

    // === VOLUTES BAROQUES GAUCHES (partent du centre, s\'évasent) ===
    // Volute principale haute gauche
    '<path d="M185 38 C170 32 150 30 130 22 C128 26 132 32 140 34 C130 33 125 38 130 44 C145 40 165 40 180 42" fill="none" stroke-width="2.2"/>' +
    // Spirale volute gauche
    '<path d="M128 22 C124 19 120 20 118 23 C116 27 119 30 123 29" fill="none" stroke-width="2"/>' +
    // Volute médiane gauche
    '<path d="M185 48 C168 50 145 54 125 62 C124 68 132 70 140 66 C133 70 132 76 138 78 C155 70 175 60 188 56" fill="none" stroke-width="2.2"/>' +
    // Volute basse gauche
    '<path d="M188 62 C170 68 150 75 135 88 C138 94 148 92 156 86 C148 92 148 98 154 100 C168 90 185 78 195 72" fill="none" stroke-width="2"/>' +
    // Petites feuilles gauche
    '<path d="M160 30 C156 32 153 36 152 42 C156 41 160 37 162 32 Z M150 50 C145 52 141 57 140 64 C145 62 150 57 152 51 Z M145 78 C141 80 138 85 138 91 C142 89 146 84 148 79 Z" stroke="none"/>' +
    // Points décoratifs gauche
    '<circle cx="120" cy="36" r="1.5" stroke="none"/>' +
    '<circle cx="122" cy="56" r="1.5" stroke="none"/>' +
    '<circle cx="130" cy="82" r="1.3" stroke="none"/>' +
    '<circle cx="148" cy="100" r="1.2" stroke="none"/>' +

    // === VOLUTES BAROQUES DROITES (miroir parfait) ===
    '<path d="M215 38 C230 32 250 30 270 22 C272 26 268 32 260 34 C270 33 275 38 270 44 C255 40 235 40 220 42" fill="none" stroke-width="2.2"/>' +

    '<path d="M240 30 C244 32 247 36 248 42 C244 41 240 37 238 32 Z M250 50 C255 52 259 57 260 64 C255 62 250 57 248 51 Z M255 78 C259 80 262 85 262 91 C258 89 254 84 252 79 Z" stroke="none"/>' +

// Ornement séparateur mini : petit motif floral
var SEP_SVG = '<svg viewBox="0 0 60 20" xmlns="http://www.w3.org/2000/svg">' +
  '<g fill="currentColor">' +
    '<path d="M30 4 c1 2 3 3 3 6 c-.5-.5 -2-1 -3-1 s-2.5 .5 -3 1 c0-3 2-4 3-6 z M25 12 c-1 1.5 -1 3.5 0 5 c1 1 2 2 5 3 c3-1 4-2 5-3 c1-1.5 1-3.5 0-5 c-1 1 -2.5 1.5 -5 1.5 s-4-.5 -5-1.5 z"/>' +
    '<path d="M15 13 c-3-1 -7-1 -12-3 M45 13 c3-1 7-1 12-3" stroke="currentColor" stroke-width="0.8" fill="none"/>' +
  '</g>' +
  '</svg>';

function generateAll() {
  var base = document.getElementById('baseUrl').value.trim().replace(/\/$/,'');
  if (!base) { alert('Veuillez entrer l\'URL de base'); return; }

  // Appliquer le format choisi sur le body + injecter @page dynamique
  var fmt = document.getElementById('format').value;
  document.body.classList.remove('fmt-13x18','fmt-2parA4','fmt-4parA4');
  var pageRule = '@page{size:100mm 150mm;margin:0}';
  if (fmt === '13x18')   { document.body.classList.add('fmt-13x18');   pageRule = '@page{size:A4 portrait;margin:8mm}'; }
  if (fmt === '2parA4')  { document.body.classList.add('fmt-2parA4');  pageRule = '@page{size:A4 landscape;margin:5mm}'; }
  if (fmt === '4parA4')  { document.body.classList.add('fmt-4parA4');  pageRule = '@page{size:A4 portrait;margin:5mm}'; }
  var styleEl = document.getElementById('page-rule') || (function(){var s=document.createElement('style');s.id='page-rule';document.head.appendChild(s);return s;})();
  styleEl.textContent = pageRule;

  var grid = document.getElementById('grid');
  grid.innerHTML = '';
  document.getElementById('config').style.display = 'none';
  document.getElementById('actions').style.display = 'flex';

  var idx = 0;
  for (var res in APPARTEMENTS) {
    var apparts = APPARTEMENTS[res];
    for (var i = 0; i < apparts.length; i++) {
      var nom = apparts[i];
      var url = base + '/?appart=' + encodeURIComponent(stripHtml(nom));

      var card = document.createElement('div');
      card.className = 'qr-card';
      var qrId = 'qr-' + idx;
      idx++;

      card.innerHTML =
        LYS_BG_SVG +
        '<div class="head">' +
          LYS_TOP_SVG +
          '<div class="brand-url">appart-hotel-berck.com</div>' +
        '</div>' +

        '<div class="separator"><div class="line"></div>' + SEP_SVG + '<div class="line"></div></div>' +

        '<div class="middle">' +
          '<div class="title-main">Questionnaire<br>de satisfaction</div>' +
          '<div class="appart-name">' + nom + '</div>' +
          '<div class="residence">' + res + '</div>' +
        '</div>' +

        '<div class="qr-wrap" id="' + qrId + '"></div>' +

        '<div class="footer-msg">' +
          '<div class="quote">&laquo;&nbsp;Votre avis compte pour nous&nbsp;&raquo;</div>' +
          '<div class="bonus">Code parrain &mdash; <strong>&minus;10%</strong> &agrave; partager</div>' +
          '<div class="signature">Claudine Podvin</div>' +
        '</div>';

      grid.appendChild(card);

      // QR noir sur crème pour scan fiable
      var qr = qrcode(0, 'M');
      qr.addData(url);
      qr.make();
      var canvas = document.createElement('canvas');
      var size = 320;
      canvas.width = size;
      canvas.height = size;
      var ctx = canvas.getContext('2d');
      var cellSize = size / qr.getModuleCount();
      ctx.fillStyle = '#f5ecd9';
      ctx.fillRect(0,0,size,size);
      for (var row = 0; row < qr.getModuleCount(); row++) {
        for (var col = 0; col < qr.getModuleCount(); col++) {
          if (qr.isDark(row, col)) {
            ctx.fillStyle = '#0a0a0a';
            ctx.fillRect(col * cellSize, row * cellSize, cellSize + 0.5, cellSize + 0.5);
          }
        }
      }
      document.getElementById(qrId).appendChild(canvas);
    }
  }
}

function stripHtml(s) {
  var d = document.createElement('div');
  d.innerHTML = s;
  return d.textContent || d.innerText || '';
}

// L'URL de base est figée sur le domaine STABLE appart-hotel-berck.com/avis (redirige vers GitHub Pages).
// Cette URL ne changera jamais → les QR codes imprimés sont valables à vie.

// Mode auto : ?auto=1 dans l'URL → génère les cartes immédiatement au chargement (pour PDF auto)
(function(){
  if (new URLSearchParams(location.search).get('auto') === '1') {
    document.addEventListener('DOMContentLoaded', function(){
      setTimeout(generateAll, 300);
    });
  }
})();

// === GENERATION PDF (2 cartes par page A4 portrait) ===
async function downloadPDF() {
  var cards = document.querySelectorAll('.qr-card');
  if (cards.length === 0) { alert('Générez d\'abord les cartes'); return; }

  var btn = event.target;
  var originalText = btn.textContent;
  btn.disabled = true;
  btn.textContent = 'Génération en cours… (peut prendre 30s)';

  try {
    var jsPDFCtor = window.jspdf.jsPDF;
    var pdf = new jsPDFCtor({orientation: 'portrait', unit: 'mm', format: 'a4'});

    // A4 = 210 x 297 mm. On met 2 cartes 100x140 centrées
    var cardW = 100, cardH = 140;
    var x = (210 - cardW) / 2;
    var marginTop = 8;
    var gap = 5;
    var y1 = marginTop;
    var y2 = marginTop + cardH + gap;

    for (var i = 0; i < cards.length; i++) {
      btn.textContent = 'Génération ' + (i+1) + '/' + cards.length + '…';
      var canvas = await html2canvas(cards[i], {
        scale: 2,
        backgroundColor: null,
        useCORS: true,
        logging: false
      });
      var imgData = canvas.toDataURL('image/jpeg', 0.92);

      var slot = i % 2; // 0 = haut, 1 = bas
      if (i > 0 && slot === 0) pdf.addPage();
      pdf.addImage(imgData, 'JPEG', x, slot === 0 ? y1 : y2, cardW, cardH);
    }

    pdf.save('QR-codes-enquete-Berck.pdf');
  } catch (err) {
    alert('Erreur génération PDF : ' + err.message);
    console.error(err);
  } finally {
    btn.disabled = false;
    btn.textContent = originalText;
  }
}
</script>
